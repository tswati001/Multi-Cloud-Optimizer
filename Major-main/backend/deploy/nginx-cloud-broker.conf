# Cloud Agility Broker — TLS at Nginx, FastAPI on 127.0.0.1:8000
#
# DNS: A record api.ananya.praanav.in → EC2 public IPv4
# On Ubuntu (from repo backend/):
#   sudo apt update && sudo apt install -y nginx python3-certbot-nginx
#   sudo cp deploy/nginx-cloud-broker.conf /etc/nginx/sites-available/cloud-broker
#   sudo ln -sf /etc/nginx/sites-available/cloud-broker /etc/nginx/sites-enabled/cloud-broker
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api.ananya.praanav.in
# Then: sudo systemctl restart cloud-broker   (unit listens on 127.0.0.1:8000)
# SG: 80 + 443 open; optional remove 8000 from internet once HTTPS works.
# Amplify rewrite: /api/<*> → https://api.ananya.praanav.in/<*>

server {
    listen 80;
    listen [::]:80;
    server_name api.ananya.praanav.in;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
